name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 0 */2 * *'  # every 2 days at midnight UTC
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          psql "$SUPABASE_URL" -c "SELECT 1;"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_DB_URL }}
